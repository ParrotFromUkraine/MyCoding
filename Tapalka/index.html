<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clicker Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f8f8f8;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #ddd;
            padding: 15px;
        }
        .menu a {
            margin: 0 15px;
            text-decoration: none;
            color: black;
        }
        .stats-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            background: #333;
            padding: 15px;
            border-radius: 10px;
            margin: 20px auto;
            width: 60%;
            color: white;
            flex-direction: row;
        }
        .stats-box {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #444;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            flex: 1;
            flex-direction: row;
            gap: 10px;
        }
        .stats-box img {
            width: 40px;
            height: 40px;
        }
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
            flex-direction: column;
        }
        .click-button {
            width: 200px;
            height: 200px;
            background: #ccc;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
        }
        .footer {
            text-align: center;
            background: #555;
            color: white;
            padding: 15px;
            margin-top: auto;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">LOGO</div>
        <div class="menu">
            <a href="#">Home</a>
            <a href="#">Market</a>
            <a href="#">Rating</a>
        </div>
        <div class="profile">Tony Stark | $19,247</div>
    </div>
    <div class="stats-container">
        <div class="stats-box">
            <img src="icon.png" alt="icon">
            <div>
                <p><strong>19,247</strong></p>
                <p>Total ClickCoins</p>
            </div>
        </div>
        <div class="stats-box">
            <img src="icon.png" alt="icon">
            <div>
                <p><strong>20</strong></p>
                <p>Coins per Click</p>
            </div>
        </div>
        <div class="stats-box">
            <img src="icon.png" alt="icon">
            <div>
                <p><strong>1/sec</strong></p>
                <p>Passive Income</p>
            </div>
        </div>
    </div>
    <div class="container">
        <button class="click-button">Click</button>
    </div>
    <div class="footer">
        <p>About game | Help center | Rules</p>
    </div>
</body>
</html>
