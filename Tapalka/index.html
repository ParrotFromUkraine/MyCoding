м<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clicker Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f8f8f8;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #ddd;
            padding: 15px;
        }
        .menu a {
            margin: 0 15px;
            text-decoration: none;
            color: black;
        }
        .container {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            flex: 1;
            align-items: center;
            justify-content: center;
        }
        .upgrades, .stats {
            width: 30%;
            background: white;
            padding: 15px;
            border-radius: 10px;
        }
        .clicker {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }
        .click-button {
            width: 200px;
            height: 200px;
            background: #ccc;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .footer {
            text-align: center;
            background: #555;
            color: white;
            padding: 15px;
            margin-top: auto;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">LOGO</div>
        <div class="menu">
            <a href="#">Home</a>
            <a href="#">Market</a>
            <a href="#">Rating</a>
        </div>
        <div class="profile">Tony Stark | $19,247</div>
    </div>
    <div class="container">
        <div class="clicker">
            <button class="click-button">Click</button>
        </div>
    </div>
    <div class="footer">
        <p>About game | Help center | Rules</p>
    </div>
</body>
</html>
